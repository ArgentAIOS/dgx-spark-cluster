# /etc/netplan/99-dgx-cluster.yaml  — spark-dgx-2 (Node 1 / Worker)
# Copy to: sudo cp netplan-node1.yaml /etc/netplan/99-dgx-cluster.yaml
# Apply:   sudo chmod 600 /etc/netplan/99-dgx-cluster.yaml && sudo netplan apply

network:
  version: 2
  ethernets:

    # Primary 200Gb Direct Fabric link to spark-dgx-1
    enp1s0f0np0:
      addresses:
        - 10.0.0.2/24
      mtu: 9000

    # Secondary 200Gb LAN port + default route
    enp1s0f1np1:
      addresses:
        - 192.168.0.218/24
      mtu: 9000
      routes:
        - to: default
          via: 192.168.0.1
      nameservers:
        addresses: [8.8.8.8, 8.8.4.4]
